<script>
document.addEventListener("DOMContentLoaded", function(){

  // Fungsi load partial
  function loadPartial(id, file){
    fetch(file)
      .then(res => {
        if (!res.ok) throw new Error(file + ' gagal di-load (status: ' + res.status + ')');
        return res.text();
      })
      .then(data => {
        document.getElementById(id).innerHTML = data;

        // Jika header di-load, aktifkan menu mobile
        if(id === 'header-placeholder'){
          const hamburger = document.querySelector('.hamburger');
          const mobileMenu = document.querySelector('.mobile-menu');
          const overlay = document.querySelector('.overlay');

          if(hamburger){
            hamburger.addEventListener('click', () => {
              mobileMenu.classList.toggle('active');
              const isActive = mobileMenu.classList.contains('active');
              if(overlay) overlay.style.display = isActive ? 'block' : 'none';
              document.body.classList.toggle('no-scroll', isActive);
            });
          }

          if(overlay){
            overlay.addEventListener('click', () => {
              mobileMenu.classList.remove('active');
              overlay.style.display = 'none';
              document.body.classList.remove('no-scroll');
            });
          }
        }
      })
      .catch(error => {
        console.error('Error:', error);
        document.getElementById(id).innerHTML = "<p style='color:red'>Gagal memuat " + file + "</p>";
      });
  }

  // Load Header & Footer
  loadPartial('header-placeholder', 'partials/header.html');
  loadPartial('footer-placeholder', 'partials/footer.html');

});
</script>
